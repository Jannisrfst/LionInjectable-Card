name: Build LionInjectable

# Builds all three shippable artefacts on a real Windows runner:
#   * client.jar            (Gradle + Shadow, compiled against src/stubs)
#   * LionInjectable.exe     (CMake + MSVC, Win32/GDI+ injector)
#   * payload.dll            (CMake + MSVC + JNI)
# and uploads them as a downloadable artefact bundle.
#
# Mirrors build.bat, adapted for GitHub's windows-latest image.

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 21: runs Gradle 8 / Shadow 8.3 (needs 17+) and supplies jni.h +
      # win32/jni_md.h that the payload DLL compiles against. setup-java also
      # exports JAVA_HOME, which injector/CMakeLists.txt requires.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # No gradlew wrapper is committed, so provision Gradle explicitly.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      # Compiles against src/stubs (real Minecraft jars are optional/compileOnly),
      # produces client/build/libs/client.jar, and stageJar copies it to
      # build/stage/client.jar at the repo root.
      - name: Build client.jar
        working-directory: client
        run: gradle build --no-daemon --stacktrace

      # Visual Studio 17 2022 generator (MSVC) is preinstalled on windows-latest.
      # Using it directly means we don't need a vcvars shell or Ninja.
      - name: Configure injector (CMake)
        run: cmake -S injector -B build-injector -G "Visual Studio 17 2022" -A x64

      - name: Build injector (Release)
        run: cmake --build build-injector --config Release

      # VS is a multi-config generator, so outputs land in build-injector/Release/.
      # The CMake POST_BUILD step already places payload.dll alongside the exe.
      - name: Collect artefacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build-injector/Release/LionInjectable.exe dist/ -Force
          Copy-Item build-injector/Release/payload.dll        dist/ -Force
          Copy-Item build/stage/client.jar                    dist/ -Force
          Get-ChildItem dist

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: LionInjectable-dist
          path: dist/
          if-no-files-found: error
